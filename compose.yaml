services:
  backend:
    build:
      context: ./main-api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - secret=${secret:-supersecretkey12345!}
      - REFRESH_secret=${REFRESH_secret:-superrefreshsecretkey12345!}
      - ALGORITHM=${ALGORITHM:-HS256}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-admin}
      - MINIO_secret=${MINIO_secret:-password123}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-file-storage}
    volumes:
      - ./main-api:/app
      - /app/.venv
    networks:
      - notebooklm
    depends_on:
      - minio
    develop:
      watch:
        - action: sync
          path: ./main-api
          target: /app
          ignore:
            - .venv/
            - __pycache__/
            - database.db
        - action: rebuild
          path: ./main-api/pyproject.toml

  minio:
    image: quay.io/minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password123}
      MINIO_API_CORS_ALLOW_ORIGIN: '*'
    volumes:
      - ./minio/data:/data
    networks:
      - notebooklm
    command: server /data --console-address ":9001"

networks:
  notebooklm:
